<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SYS Stock Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0d0f14;
        --surface: #161a22;
        --border: #252b38;
        --accent: #00d4ff;
        --accent2: #ff6b35;
        --green: #00e676;
        --yellow: #ffea00;
        --red: #ff1744;
        --text: #e8eaf0;
        --muted: #6b7280;
        --font: 'IBM Plex Sans Thai', sans-serif;
        --mono: 'IBM Plex Mono', monospace;
      }
      body.light-theme {
        --bg: #f4f6f8;
        --surface: #ffffff;
        --border: #e2e8f0;
        --text: #1e293b;
        --muted: #64748b;
        --accent: #0284c7;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        padding: 20px;
        transition: background 0.3s, color 0.3s;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
      }
      h1 {
        font-size: 20px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      h1 span {
        color: var(--accent);
      }
      .clock {
        font-family: var(--mono);
        color: var(--muted);
        font-size: 14px;
        background: var(--surface);
        padding: 4px 12px;
        border-radius: 20px;
        border: 1px solid var(--border);
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        transition: transform 0.2s;
      }
      .stat-card:hover {
        transform: translateY(-2px);
        border-color: var(--accent);
      }
      .stat-label {
        font-size: 13px;
        color: var(--muted);
        font-weight: 500;
      }
      .stat-value {
        font-size: 28px;
        font-weight: 600;
        font-family: var(--mono);
      }
      .stat-value.red {
        color: var(--red);
      }
      .stat-value.yellow {
        color: var(--yellow);
      }
      .control-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 16px;
        align-items: center;
        background: var(--surface);
        padding: 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
      }
      .search-box {
        display: flex;
        gap: 8px;
        flex: 1;
        min-width: 250px;
      }
      .search-input {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 10px 16px;
        border-radius: 8px;
        font-family: var(--font);
        font-size: 14px;
      }
      .btn {
        background: var(--accent);
        color: #000;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-family: var(--font);
        font-weight: 500;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn:hover {
        opacity: 0.9;
        transform: scale(0.98);
      }
      .btn-outline {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-outline:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .table-container {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
      }
      th,
      td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 14px;
      }
      th {
        color: var(--muted);
        font-weight: 500;
        position: sticky;
        top: 0;
        background: var(--surface);
        z-index: 10;
        white-space: nowrap;
      }
      tbody tr:last-child td {
        border-bottom: none;
      }
      tbody tr:hover {
        background: rgba(255, 255, 255, 0.02);
      }
      body.light-theme tbody tr:hover {
        background: rgba(0, 0, 0, 0.02);
      }
      code {
        font-family: var(--mono);
        color: var(--accent2);
        background: rgba(255, 107, 53, 0.1);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 13px;
      }
      .badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .badge.green {
        background: rgba(0, 230, 118, 0.1);
        color: var(--green);
      }
      .badge.yellow {
        background: rgba(255, 234, 0, 0.1);
        color: var(--yellow);
      }
      .badge.red {
        background: rgba(255, 23, 68, 0.1);
        color: var(--red);
      }
      .no-col {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 12px;
      }
      .loading-row td {
        text-align: center;
        padding: 40px;
        color: var(--muted);
      }
      .spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        vertical-align: middle;
        margin-right: 8px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (max-width: 768px) {
        .stats-grid {
          grid-template-columns: 1fr 1fr;
        }
        thead {
          display: none;
        }
        tbody tr {
          display: block;
          padding: 12px;
          border-bottom: 4px solid var(--bg);
        }
        td {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 8px 4px;
          border-bottom: 1px solid var(--border);
        }
        td:last-child {
          border-bottom: none;
        }
        td::before {
          content: attr(data-label);
          font-weight: 600;
          color: var(--muted);
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>
        📦 <span>SYS</span> Stock
        <small style="font-size: 10px; color: gray">(V2-115)</small>
      </h1>
      <div id="clock" class="clock">00:00:00</div>
    </header>

    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-label">Total Items</span>
        <span class="stat-value"><?= totalItems ?></span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Low Stock</span>
        <span class="stat-value yellow"><?= lowCount ?></span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Out of Stock</span>
        <span class="stat-value red"><?= outCount ?></span>
      </div>
    </div>

    <div class="control-bar">
      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="🔍 ค้นหาชื่อ หรือ รหัส..."
          value="<?= search ?>"
        />
        <button class="btn" onclick="loadTable()">ค้นหา</button>
      </div>
      <button id="exportBtn" class="btn btn-outline">📥 Export CSV</button>
      <button id="themeToggle" class="btn btn-outline">☀️ Light</button>
    </div>

    <div class="table-container">
      <table id="stockTable">
        <thead>
          <tr>
            <th style="width: 48px">No.</th>
            <th>Material Code</th>
            <th style="text-align: center; width: 68px">QR</th>
            <th>Description</th>
            <th style="text-align: center">Total QTY</th>
            <th style="text-align: center">CBR</th>
            <th style="text-align: center">CCS</th>
            <th style="text-align: center">SKO</th>
            <th style="text-align: center">RYG</th>
            <th style="text-align: center">TRT</th>
            <th style="text-align: center">Status</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="loading-row">
            <td colspan="11">
              <span class="spinner"></span> กำลังโหลดข้อมูล...
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <script>
      // ─── Clock ───
      function updateClock() {
        const d = new Date()
        document.getElementById('clock').textContent =
          d.toLocaleDateString('th-TH', {
            day: '2-digit',
            month: 'short',
            year: '2-digit'
          }) +
          ' | ' +
          d.toLocaleTimeString()
      }
      updateClock()
      setInterval(updateClock, 1000)

      // ─── Theme ───
      const toggleBtn = document.getElementById('themeToggle')
      if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-theme')
        toggleBtn.textContent = '🌙 Dark'
      }
      toggleBtn.addEventListener('click', () => {
        const isLight = document.body.classList.toggle('light-theme')
        localStorage.setItem('theme', isLight ? 'light' : 'dark')
        toggleBtn.textContent = isLight ? '🌙 Dark' : '☀️ Light'
      })

      // ─── Search (Enter key) ───
      document
        .getElementById('searchInput')
        .addEventListener('keydown', function (e) {
          if (e.key === 'Enter') loadTable()
        })

      // ─── Load Table via google.script.run ───
      function loadTable() {
        const q = document.getElementById('searchInput').value.trim()
        const tbody = document.getElementById('tableBody')
        tbody.innerHTML =
          '<tr class="loading-row"><td colspan="11"><span class="spinner"></span> กำลังโหลดข้อมูล...</td></tr>'

        google.script.run
          .withSuccessHandler(renderTable)
          .withFailureHandler(function (err) {
            tbody.innerHTML =
              '<tr><td colspan="11" style="text-align:center;padding:40px;color:var(--red)">❌ Error: ' +
              err.message +
              '</td></tr>'
          })
          .getStockRows(q)
      }

      function renderTable(rows) {
        const tbody = document.getElementById('tableBody')
        if (!rows || rows.length === 0) {
          tbody.innerHTML =
            '<tr><td colspan="11" style="text-align:center;padding:48px;color:var(--muted)">❌ ไม่พบข้อมูลสินค้า (โปรดตรวจสอบว่า Tab ใน Google Sheets ชื่อ "STOCK" หรือไม่)</td></tr>'
          return
        }

        tbody.innerHTML = rows
          .map(function (r, idx) {
            const qrUrl =
              'https://api.qrserver.com/v1/create-qr-code/?size=48x48&data=' +
              encodeURIComponent(r.code)
            const badge =
              r.qty <= 0
                ? '<span class="badge red">หมด</span>'
                : r.qty <= 1
                ? '<span class="badge yellow">ใกล้หมด</span>'
                : '<span class="badge green">ปกติ</span>'
            return (
              '<tr>' +
              '<td data-label="No." class="no-col">' +
              (idx + 1) +
              '</td>' +
              '<td data-label="Material Code"><code>' +
              r.code +
              '</code></td>' +
              '<td data-label="QR" style="text-align:center"><img src="' +
              qrUrl +
              '" width="40" height="40" loading="lazy" style="border-radius:4px"/></td>' +
              '<td data-label="Description">' +
              r.desc +
              '</td>' +
              '<td data-label="Total QTY" style="text-align:center;font-family:var(--mono);font-weight:500">' +
              r.qty +
              '</td>' +
              '<td data-label="CBR" style="text-align:center">' +
              r.cbr +
              '</td>' +
              '<td data-label="CCS" style="text-align:center">' +
              r.ccs +
              '</td>' +
              '<td data-label="SKO" style="text-align:center">' +
              r.sko +
              '</td>' +
              '<td data-label="RYG" style="text-align:center">' +
              r.ryg +
              '</td>' +
              '<td data-label="TRT" style="text-align:center">' +
              r.trt +
              '</td>' +
              '<td data-label="Status" style="text-align:center">' +
              badge +
              '</td>' +
              '</tr>'
            )
          })
          .join('')
      }

      // ─── Export CSV ───
      document
        .getElementById('exportBtn')
        .addEventListener('click', function () {
          const table = document.getElementById('stockTable')
          const csvRows = []
          table.querySelectorAll('tr').forEach(function (row) {
            const cols = []
            row.querySelectorAll('th, td').forEach(function (cell) {
              if (cell.querySelector('img')) {
                cols.push('"QR"')
                return
              }
              cols.push('"' + cell.innerText.trim().replace(/"/g, '""') + '"')
            })
            if (cols.length) csvRows.push(cols.join(','))
          })
          const blob = new Blob(['\uFEFF' + csvRows.join('\n')], {
            type: 'text/csv;charset=utf-8;'
          })
          const a = document.createElement('a')
          a.href = URL.createObjectURL(blob)
          a.download =
            'SYS-Stock-' + new Date().toISOString().split('T')[0] + '.csv'
          a.click()
          URL.revokeObjectURL(a.href)
        })

      // ─── Auto-load on page open ───
      loadTable()
    </script>
  </body>
</html>
