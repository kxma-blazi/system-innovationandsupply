<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SYS Stock Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #0d0f14;
        --surface: #161a22;
        --border: #252b38;
        --accent: #00d4ff;
        --accent2: #ff6b35;
        --green: #00e676;
        --yellow: #ffea00;
        --red: #ff1744;
        --text: #e8eaf0;
        --muted: #6b7280;
        --font: 'IBM Plex Sans Thai', sans-serif;
        --mono: 'IBM Plex Mono', monospace;
      }
      body.light-theme {
        --bg: #f4f6f8;
        --surface: #ffffff;
        --border: #e2e8f0;
        --text: #1e293b;
        --muted: #64748b;
        --accent: #0284c7;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        padding: 20px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        transition: 0.3s;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
      }
      .clock {
        font-family: var(--mono);
        color: var(--muted);
        font-size: 14px;
        background: var(--surface);
        padding: 4px 12px;
        border-radius: 20px;
        border: 1px solid var(--border);
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
      }
      .stat-value {
        font-size: 28px;
        font-weight: 600;
        font-family: var(--mono);
      }
      .stat-value.red {
        color: var(--red);
      }
      .stat-value.yellow {
        color: var(--yellow);
      }
      .control-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 16px;
        background: var(--surface);
        padding: 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
      }
      .search-box {
        display: flex;
        gap: 8px;
        flex: 1;
      }
      .search-input {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 10px 16px;
        border-radius: 8px;
      }
      .btn {
        background: var(--accent);
        color: #000;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 500;
      }
      .btn-outline {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }
      .table-container {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow-x: auto;
        flex: 1;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 14px;
      }
      .badge {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
      }
      .badge.green {
        background: rgba(0, 230, 118, 0.1);
        color: var(--green);
      }
      .badge.yellow {
        background: rgba(255, 234, 0, 0.1);
        color: var(--yellow);
      }
      .badge.red {
        background: rgba(255, 23, 68, 0.1);
        color: var(--red);
      }

      /* Footer Style */
      footer {
        margin-top: 40px;
        padding: 30px;
        border-top: 1px solid var(--border);
        background: var(--surface);
        text-align: center;
        border-radius: 12px 12px 0 0;
      }
      .footer-dev {
        font-size: 14px;
        color: var(--text);
        margin-bottom: 5px;
      }
      .footer-dev span {
        color: var(--accent);
        font-weight: 600;
      }
      .footer-links {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin: 10px 0;
      }
      .footer-link {
        text-decoration: none;
        color: var(--muted);
        font-size: 13px;
        padding: 5px 12px;
        border: 1px solid var(--border);
        border-radius: 15px;
      }
      .footer-version {
        font-size: 11px;
        color: var(--muted);
        opacity: 0.5;
        font-family: var(--mono);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>
        📦 <span>SYS</span> Stock
        <small style="font-size: 10px; color: gray">(V2-115)</small>
      </h1>
      <div id="clock" class="clock">00:00:00</div>
    </header>

    <div class="stats-grid">
      <div class="stat-card">
        <div style="color: var(--muted); font-size: 13px">Total Items</div>
        <div class="stat-value"><?= totalItems ?></div>
      </div>
      <div class="stat-card">
        <div style="color: var(--muted); font-size: 13px">Low Stock</div>
        <div class="stat-value yellow"><?= lowCount ?></div>
      </div>
      <div class="stat-card">
        <div style="color: var(--muted); font-size: 13px">Out of Stock</div>
        <div class="stat-value red"><?= outCount ?></div>
      </div>
    </div>

    <div class="control-bar">
      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="🔍 ค้นหาชื่อ หรือ รหัส..."
          value="<?= search ?>"
        />
        <button class="btn" onclick="loadTable()">ค้นหา</button>
      </div>
      <button id="exportBtn" class="btn btn-outline">📥 Export CSV</button>
      <button id="themeToggle" class="btn btn-outline">☀️ Light</button>
    </div>

    <div class="table-container">
      <table id="stockTable">
        <thead>
          <tr>
            <th>No.</th>
            <th>Material Code</th>
            <th style="text-align: center">QR</th>
            <th>Description</th>
            <th style="text-align: center">Total QTY</th>
            <th style="text-align: center">Status</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="6" style="text-align: center; padding: 40px">
              กำลังโหลดข้อมูล...
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <footer>
      <div class="footer-dev">Developed by <span>Saharat Intavira</span></div>
      <div style="font-size: 12px; color: var(--muted)">
        Operation and Maintenance Department
      </div>
      <div class="footer-links">
        <a href="mailto:okumakung2018@gmail.com" class="footer-link"
          >✉️ Support</a
        >
        <a href="#" class="footer-link">💬 Line</a>
      </div>
      <div class="footer-version">SYS STOCK SYSTEM | V2.1.5</div>
    </footer>

    <script>
      // Clock
      function updateClock() {
        const d = new Date()
        document.getElementById('clock').textContent =
          d.toLocaleDateString('th-TH') + ' | ' + d.toLocaleTimeString()
      }
      setInterval(updateClock, 1000)
      updateClock()

      // Theme
      const toggleBtn = document.getElementById('themeToggle')
      toggleBtn.addEventListener('click', () => {
        const isLight = document.body.classList.toggle('light-theme')
        localStorage.setItem('theme', isLight ? 'light' : 'dark')
        toggleBtn.textContent = isLight ? '🌙 Dark' : '☀️ Light'
      })
      if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-theme')
        toggleBtn.textContent = '🌙 Dark'
      }

      // Load Data
      function loadTable() {
        const q = document.getElementById('searchInput').value
        google.script.run.withSuccessHandler(renderTable).getStockRows(q)
      }

      function renderTable(rows) {
        const tbody = document.getElementById('tableBody')
        if (!rows || rows.length === 0) {
          tbody.innerHTML =
            '<tr><td colspan="6" style="text-align:center; padding: 40px;">ไม่พบข้อมูล</td></tr>'
          return
        }
        tbody.innerHTML = rows
          .map((r, idx) => {
            const badge =
              r.qty <= 0
                ? 'red">หมด'
                : r.qty <= 5
                ? 'yellow">ใกล้หมด'
                : 'green">ปกติ'
            return `<tr>
            <td>${idx + 1}</td>
            <td><code>${r.code}</code></td>
            <td style="text-align:center"><img src="https://api.qrserver.com/v1/create-qr-code/?size=40x40&data=${
              r.code
            }" width="35"></td>
            <td>${r.desc}</td>
            <td style="text-align:center">${r.qty}</td>
            <td style="text-align:center"><span class="badge ${badge}</span></td>
          </tr>`
          })
          .join('')
      }

      window.onload = loadTable
    </script>
  </body>
</html>
